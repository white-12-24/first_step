<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>성경 챗봇</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    width: 900px;
    margin: auto;
}

.chat-box {
    height: 700px;
    overflow-y: scroll;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.message {
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    max-width: 75%;
    font-size: 16px;
    line-height: 1.7;
}

.user {
    background: #d1e7dd;
    margin-left: auto;
}

.bot {
    background: #e2e3e5;
}

input {
    flex: 1;
    padding: 15px;
    font-size: 16px;
}

button {
    width: 120px;
    font-size: 15px;
}
</style>
</head>

<body>
<div class="container">

<h2>성경 챗봇</h2>

<div id="chat" class="chat-box"></div>

<div class="input-box">
<input id="question" placeholder="질문을 입력하세요..." />
<button onclick="send()">전송</button>
</div>

</div>

<script>
async function send() {
    const q = document.getElementById("question").value;
    if (!q) return;

    addMessage(q, "user");

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
    });

    const data = await res.json();

    addMessage(data.answer_text, "bot");

    document.getElementById("question").value = "";
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
